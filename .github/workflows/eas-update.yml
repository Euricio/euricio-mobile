# EAS Update — Push an OTA JS update to a release channel / branch.
#
# Requires repo secret EXPO_TOKEN (same token used by eas-build.yml).

name: EAS Update

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "EAS Update branch (usually 'production' or 'preview')"
        required: true
        default: "production"
        type: string
      message:
        description: "Update message shown in the EAS dashboard"
        required: true
        default: "OTA update"
        type: string

jobs:
  update:
    name: EAS Update (${{ inputs.branch }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish EAS Update
        run: eas update --branch "${{ inputs.branch }}" --message "${{ inputs.message }}" --non-interactive
